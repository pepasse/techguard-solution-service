<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Admin Dashboard - TechGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">🛡️ TechGuard Admin</span>
            <button class="btn btn-warning" onclick="logout()">Déconnexion</button>
        </div>
    </nav>

    <div class="container-fluid mt-5">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active" onclick="showTab('contacts')">Contacts</a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showTab('projects')">Projets</a>
                </div>
            </div>
            <div class="col-md-9">
                <div id="contacts-tab">
                    <h2>Contacts</h2>
                    <table class="table"><tbody id="contactsList"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api-client.js"></script>
    <script>
        async function loadContacts() {
            const contacts = await apiClient.getContacts();
            document.getElementById('contactsList').innerHTML = contacts.map(c => 
                `<tr><td>${c.name}</td><td>${c.email}</td><td>${c.service}</td></tr>`
            ).join('');
        }
        function logout() { if (confirm('Déconnexion ?')) window.location = 'admin-login.html'; }
        loadContacts();
    </script>
</body>
</html>
